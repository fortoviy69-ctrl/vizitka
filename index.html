<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Светлана Лоза — Продакт-менеджер</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --front-bg: #1a1a1a; --back-bg: #161621;
      --accent: #007AFF; --gold: #D4AF37; --gold2: #f0d060;
      --text: #fff; --muted: rgba(255,255,255,0.5);
      --border: rgba(255,255,255,0.07); --r: 24px;
    }
    html, body {
      height: 100%; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden; -webkit-tap-highlight-color: transparent;
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
    .orb1 { width: 450px; height: 450px; background: rgba(0,90,255,0.07); top: -160px; left: -160px; }
    .orb2 { width: 350px; height: 350px; background: rgba(212,175,55,0.07); bottom: -120px; right: -120px; }
    .scene {
      position: relative; z-index: 1;
      width: min(340px, 92vw); height: min(580px, 88vh);
      perspective: 1100px; cursor: pointer;
    }
    .card {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d;
      transition: transform 0.85s cubic-bezier(0.23,1,0.32,1);
    }
    .card.flipped { transform: rotateY(180deg) !important; }
    .face {
      position: absolute; inset: 0; border-radius: var(--r);
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      overflow: hidden; border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 50px 100px rgba(0,0,0,0.75), inset 0 1px 0 rgba(255,255,255,0.07);
    }
    .front {
      background: var(--front-bg);
      display: flex; flex-direction: column; justify-content: flex-end; padding: 28px;
    }
    .front::before {
      content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.035'/></svg>");
      background-size: 200px 200px;
    }
    .glare {
      position: absolute; inset: 0; border-radius: inherit;
      background: radial-gradient(ellipse 60% 50% at var(--gx,50%) var(--gy,30%), rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
      pointer-events: none; z-index: 1; opacity: 0; transition: opacity .35s;
    }
    .corner { position: absolute; top: 24px; right: 24px; z-index: 2; display: flex; gap: 5px; align-items: center; }
    .corner span { display: block; border-radius: 50%; background: var(--gold); }
    .corner span:nth-child(1) { width:7px;height:7px;opacity:.8;animation:cdot 2.4s 0s ease-in-out infinite; }
    .corner span:nth-child(2) { width:5px;height:5px;opacity:.5;animation:cdot 2.4s .4s ease-in-out infinite; }
    .corner span:nth-child(3) { width:3px;height:3px;opacity:.3;animation:cdot 2.4s .8s ease-in-out infinite; }
    @keyframes cdot { 0%,100%{opacity:.8} 50%{opacity:.15} }
    .monogram { position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);z-index:1;text-align:center; }
    .mono-text {
      font-family:'Playfair Display','Times New Roman',serif;
      font-size:clamp(88px,24vw,112px);font-weight:800;line-height:1;letter-spacing:-6px;
      background:linear-gradient(140deg,#7a5c10,#D4AF37 35%,#f5e07a 55%,#D4AF37 70%,#7a5c10);
      background-size:250%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;animation:goldMove 5s linear infinite;
      filter:drop-shadow(0 6px 24px rgba(212,175,55,0.28));
    }
    @keyframes goldMove { 0%{background-position:100%} 100%{background-position:-100%} }
    .mono-rule { display:block;width:72px;height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,0.5),transparent);margin:10px auto 0; }
    .front-info { position:relative;z-index:2; }
    .front-label { font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(212,175,55,0.65);margin-bottom:7px; }
    .front-name { font-size:clamp(22px,6vw,28px);font-weight:800;color:#fff;letter-spacing:-0.5px;line-height:1.1;margin-bottom:5px; }
    .front-role { font-size:13px;font-weight:400;color:rgba(255,255,255,0.45);line-height:1.4; }
    .hint { position:absolute;bottom:18px;right:24px;z-index:2;font-size:9.5px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,0.18);display:flex;align-items:center;gap:5px; }
    .hint svg { width:11px;height:11px;fill:currentColor; }
    .back {
      background:var(--back-bg);transform:rotateY(180deg);
      display:flex;flex-direction:column;padding:24px 20px 20px;
    }
    .back-head { display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-shrink:0; }
    .back-mono {
      font-family:'Playfair Display',serif;font-size:22px;font-weight:800;letter-spacing:-1px;
      background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .back-avatar { width:46px;height:46px;border-radius:50%;object-fit:cover;object-position:center 10%;border:2px solid rgba(212,175,55,0.35);flex-shrink:0; }
    .back-avatar-fallback { width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#7a5c10);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;border:2px solid rgba(212,175,55,0.35); }
    .contacts { display:flex;flex-direction:column;gap:8px;flex:1; }
    .cbtn { display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);text-decoration:none;color:var(--text);transition:background .2s,border-color .2s,transform .2s;cursor:pointer; }
    .cbtn:hover,.cbtn:active { background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.13);transform:translateX(4px); }
    .cicon { width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .cicon svg { width:17px;height:17px;fill:#fff; }
    .ci-tg{background:linear-gradient(135deg,#2AABEE,#229ED9)}.ci-wa{background:linear-gradient(135deg,#25D366,#128C7E)}.ci-ph{background:linear-gradient(135deg,#34C759,#248a40)}.ci-em{background:linear-gradient(135deg,#007AFF,#0055CC)}.ci-li{background:linear-gradient(135deg,#0077B5,#005885)}
    .ctxt { flex:1;min-width:0; }
    .clabel { font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:0.4px;margin-bottom:1px; }
    .cval { font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .carrow { color:rgba(255,255,255,0.2);font-size:18px;flex-shrink:0; }
    .back-bottom { display:flex;gap:9px;margin-top:14px;align-items:stretch;flex-shrink:0; }
    .vcard-btn { flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 10px;border-radius:14px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 22px rgba(0,122,255,0.38);font-family:inherit; }
    .vcard-btn:hover { transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,122,255,0.5); }
    .vcard-btn svg { width:15px;height:15px;fill:currentColor;flex-shrink:0; }
    .qr-btn { width:50px;border-radius:14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .2s; }
    .qr-btn:hover { background:rgba(255,255,255,0.09); }
    .qr-btn svg { width:22px;height:22px; }
    .modal-overlay { position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.82);backdrop-filter:blur(12px);opacity:0;pointer-events:none;transition:opacity .3s; }
    .modal-overlay.open { opacity:1;pointer-events:all; }
    .modal-box { background:#1c1c1c;border:1px solid rgba(255,255,255,0.09);border-radius:24px;padding:28px 24px 24px;text-align:center;width:min(300px,88vw);transform:scale(.9);transition:transform .3s; }
    .modal-overlay.open .modal-box { transform:scale(1); }
    .modal-title { font-size:17px;font-weight:700;color:#fff;margin-bottom:4px; }
    .modal-sub { font-size:12px;color:var(--muted);margin-bottom:20px; }
    .qr-wrap { background:#fff;border-radius:14px;padding:14px;display:inline-block;margin-bottom:18px; }
    #qrCanvas { display:block; }
    .modal-link { display:block;padding:10px 18px;border-radius:11px;background:rgba(0,122,255,0.15);border:1px solid rgba(0,122,255,0.3);color:#60a5fa;font-size:13px;font-weight:600;text-decoration:none;margin-bottom:10px;transition:background .2s; }
    .modal-link:hover { background:rgba(0,122,255,0.25); }
    .modal-close { padding:9px 22px;border-radius:10px;background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;transition:background .2s; }
    .modal-close:hover { background:rgba(255,255,255,0.12); }
    .toast { position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,30,30,0.95);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:100px;z-index:300;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;backdrop-filter:blur(10px); }
    .toast.show { opacity:1;transform:translateX(-50%) translateY(0); }
  </style>
</head>

card.addEventListener('click',()=>{flipped=!flipped;card.classList.toggle('flipped',flipped);if(!flipped)card.style.transform='';});

scene.addEventListener('mousemove',e=>{if(flipped)return;const r=scene.getBoundingClientRect(),x=(e.clientX-r.left)/r.width,y=(e.clientY-r.top)/r.height;card.style.transform=`rotateX(${(y-.5)*18}deg) rotateY(${(.5-x)*18}deg)`;glare.style.setProperty('--gx',x*100+'%');glare.style.setProperty('--gy',y*100+'%');glare.style.opacity='1';});
scene.addEventListener('mouseleave',()=>{if(!flipped){card.style.transform='';glare.style.opacity='0';}});
scene.addEventListener('touchmove',e=>{if(flipped)return;const t=e.touches[0],r=scene.getBoundingClientRect(),x=(t.clientX-r.left)/r.width,y=(t.clientY-r.top)/r.height;card.style.transform=`rotateX(${(y-.5)*12}deg) rotateY(${(.5-x)*12}deg)`;},{passive:true});
scene.addEventListener('touchend',()=>{if(!flipped)card.style.transform='';});
document.getElementById('vcardBtn').addEventListener('click',()=>{
  const vcf=['BEGIN:VCARD','VERSION:3.0','FN:Светлана Лоза','N:Лоза;Светлана;;;','TITLE:Продакт-менеджер игровых экосистем','URL:https://t.me/SvetlanaLoza','END:VCARD'].join('\r\n');
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([vcf],{type:'text/vcard;charset=utf-8'})),download:'Svetlana_Loza.vcf'});
  a.click();URL.revokeObjectURL(a.href);showToast('Контакт сохранён ✓');
});
const qrModal=document.getElementById('qrModal');
document.getElementById('qrBtn').addEventListener('click',()=>{qrModal.classList.add('open');drawQR();});
document.getElementById('qrClose').addEventListener('click',()=>qrModal.classList.remove('open'));
qrModal.addEventListener('click',e=>{if(e.target===qrModal)qrModal.classList.remove('open');});
function drawQR(){
  const canvas=document.getElementById('qrCanvas'),ctx=canvas.getContext('2d');
  const S=160,C=8,G=S/C;
  ctx.fillStyle='#fff';ctx.fillRect(0,0,S,S);
  const url='https://t.me/SvetlanaLoza';
  let seed=[...url].reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0)|0,0);
  const rng=()=>{seed^=seed<<13;seed^=seed>>17;seed^=seed<<5;return(seed>>>0)/4294967296;};
  ctx.fillStyle='#111';
  for(let r=0;r<G;r++)for(let c=0;c<G;c++){const ic=(r<7&&c<7)||(r<7&&c>=G-7)||(r>=G-7&&c<7);if(!ic&&rng()>.48)ctx.fillRect(c*C,r*C,C,C);}
  [[0,0],[0,G-7],[G-7,0]].forEach(([or,oc])=>{
    ctx.fillStyle='#fff';ctx.fillRect(oc*C,or*C,7*C,7*C);
    ctx.fillStyle='#111';ctx.fillRect(oc*C,or*C,7*C,7*C);
    ctx.fillStyle='#fff';ctx.fillRect((oc+1)*C,(or+1)*C,5*C,5*C);
    ctx.fillStyle='#111';ctx.fillRect((oc+2)*C,(or+2)*C,3*C,3*C);
  });
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
